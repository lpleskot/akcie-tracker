name = "akcie-tracker-cron"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Cron trigger — každý den v 15:00 UTC = 17:00 Prague (létě) / 16:00 (zimě)
# Cca 1 hodinu po otevření US burz, ~před otevřením EU burz
[triggers]
crons = ["0 15 * * *"]

# Bindings na KV namespace (sdílený s Pages projektem akcie-tracker).
# Z KV se čtou přímo: watchlist, alerts, portfolio-overlay:{PORTFOLIO_ID},
# fired:* — žádné HTTP na vlastní API (funguje i za Cloudflare Access).
[[kv_namespaces]]
binding = "AKCIE_TRACKER_KV"
id = "6d78ccbecdc64d7e9798f1ed39fca35d"

[vars]
# Statický portfolio JSON + quote proxy se čtou přes HTTP z Pages
PORTFOLIO_URL = "https://akcie-tracker.pages.dev/data/portfolios/plegi-invest-ibkr.json"
QUOTE_API = "https://akcie-tracker.pages.dev/api/quote"
PORTFOLIO_ID = "plegi-invest-ibkr"
EMAIL_FROM = "alerts@notify.plegiholding.cz"
EMAIL_TO = "pleskot@plegiholding.cz"
DASHBOARD_URL = "https://akcie-tracker.pages.dev"

# Secrets (wrangler secret put <NÁZEV>, nebo CF dashboard → Settings → Variables):
#   RESEND_API_KEY          — odesílání alertů + failure notifikací (povinné)
#   ADMIN_KEY               — ochrana manuálního /run endpointu (bez něj je /run zavřený)
#   CF_ACCESS_CLIENT_ID     — service token, až bude Pages za Cloudflare Access
#   CF_ACCESS_CLIENT_SECRET — (bez nich se HTTP fetche posílají bez Access hlaviček)
